services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: rag_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  docpilot-backend:
    build: ./DocPilot/backend
    ports:
      - "8000:8000"
    volumes:
      - ./DocPilot/backend:/app
      - ./pilotcore:/app/pilotcore
      - ./.env:/.env
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  docpilot-frontend:
    build: ./DocPilot/frontend
    ports:
      - "5173:5173"
    depends_on:
      - docpilot-backend

  tracepilot-backend:
    build: ./TracePilot/backend
    ports:
      - "8001:8001"
    volumes:
      - ./TracePilot/backend:/app
      - ./pilotcore:/app/pilotcore
      - ./.env:/.env
    env_file:
      - .env
    depends_on:
      - docpilot-backend

  tracepilot-frontend:
    build: ./TracePilot/frontend
    ports:
      - "5174:5174"
    depends_on:
      - tracepilot-backend

volumes:
  postgres_data:
